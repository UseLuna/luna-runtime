name = "useluna/luna_runtime"
version = "0.1.0"
description = "Animation runtime for Roblox. Playback, blending, modifiers."
authors = ["PRMS Developer"]
repository = "https://github.com/UseLuna/luna-runtime"
license = "MIT"
includes = [
	"pesde.toml",
	"README.md",
	"LICENSE",
	"default.project.json",
	"src/**/*.luau",
]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["default.project.json"]

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
janitor = { wally = "howmanysmall/janitor", version = "1.18.3" }

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }
jest = { wally = "jsdotlua/jest", version = "3.10.0" }
jest_globals = { wally = "jsdotlua/jest-globals", version = "3.10.0" }
iris = { wally = "sirmallard/iris", version = "2.5.1" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
